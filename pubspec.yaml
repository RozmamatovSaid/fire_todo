name: fire_todo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/fire_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/fire_logo.png"
  web:
    generate: false

flutter_native_splash:
  color: "#000000"
  image: assets/images/fire_logo.png
  color_dark: "#000000"
  image_dark: assets/images/fire_logo.png
  android_12:
    image: assets/images/fire_logo.png
    color: "#000000"
    image_dark: assets/images/fire_logo.png
    color_dark: "#000000"
  fullscreen: true


environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  easy_localization: ^3.0.8
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  dotted_border: ^3.1.0
  path_provider: ^2.1.6
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  equatable: ^2.1.0
  isar: ^3.1.0+1
  get_it: ^9.2.1
  lottie: ^3.5.1
  cupertino_icons: ^1.0.9
  bloc_concurrency: ^0.3.0
  stream_transform: ^2.1.1
  isar_flutter_libs: ^3.1.0+1
  fl_chart: ^1.2.0
  share_plus: ^13.2.0
  file_picker: ^3.0.4
  intl: ^0.20.2
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/roboto/
    - assets/fonts/recoleta/
    - assets/i18n/
    - assets/lottie/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/roboto/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/roboto/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/roboto/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/roboto/Roboto-Bold.ttf
          weight: 700

    - family: Recoleta
      fonts:
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-light.otf
          weight: 300
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-regular.otf
          weight: 400
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-medium.otf
          weight: 500
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-semibold.otf
          weight: 600
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-bold.otf
          weight: 700
