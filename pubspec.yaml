name: fire_todo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  easy_localization: ^3.0.8
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  dotted_border: ^3.1.0
  path_provider: ^2.1.6
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  equatable: ^2.1.0
  isar: ^3.1.0+1
  get_it: ^9.2.1
  lottie: ^3.5.1
  cupertino_icons: ^1.0.9
  bloc_concurrency: ^0.3.0
  stream_transform: ^2.1.1
  isar_flutter_libs: ^3.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/roboto/
    - assets/fonts/recoleta/
    - assets/i18n/
    - assets/lottie/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/roboto/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/roboto/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/roboto/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/roboto/Roboto-Bold.ttf
          weight: 700

    - family: Recoleta
      fonts:
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-light.otf
          weight: 300
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-regular.otf
          weight: 400
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-medium.otf
          weight: 500
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-semibold.otf
          weight: 600
        - asset: assets/fonts/recoleta/fonnts.com-recoleta-bold.otf
          weight: 700
